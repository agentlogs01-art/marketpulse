# ... (rest of your workflow config stays the same) ...

jobs:
  run-briefing:
    if: github.event.schedule == '30 0 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily briefing pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # ... rest of your secrets ...
        run: |
          if [ -n "${{ github.event.inputs.prev_close }}" ]; then
            python -m marketpulse.scheduler.run_daily_briefing --prev-close "${{ github.event.inputs.prev_close }}"
          else
            python -m marketpulse.scheduler.run_daily_briefing
          fi

  record-close:
    if: github.event.schedule == '15 10 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Record today's official Nifty 50 close
        env:
          PYTHONPATH: ${{ github.workspace }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m marketpulse.scheduler.record_daily_close
